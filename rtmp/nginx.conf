worker_processes auto;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application ingest {
            live on;
            record off;
            allow publish all;
            allow play all;
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 8s;
            hls_cleanup on;
        }

        application matrix {
            live on;
            record off;
            allow publish all;
            allow play all;
        }
    }
}

http {
    server {
        listen 80 default_server;
        server_name _;

        location = / {
            return 200 'streambox rtmp is running';
            add_header Content-Type text/plain;
        }

        location ^~ /hls/ {
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Headers *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            alias /tmp/hls/;
        }

        location = /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location = /stat.xsl {
            root /usr/local/nginx/html;
        }
    }
}
